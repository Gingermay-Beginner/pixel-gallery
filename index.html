<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>May 的博物馆</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%;height:100%;background:#111;overflow:hidden;
  font-family:'PingFang SC','Hiragino Sans',sans-serif; touch-action:none; }
canvas { display:block; }

/* D-pad */
#dpad {
  position:fixed; bottom:18px; right:16px;
  display:grid; grid-template-columns:repeat(3,40px); grid-template-rows:repeat(3,40px); gap:3px;
  z-index:10; pointer-events:none;
}
.db {
  width:40px;height:40px;
  background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:rgba(255,255,255,0.6);
  pointer-events:all;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.db:active{background:rgba(255,255,255,0.28);}
.de{visibility:hidden;pointer-events:none;}
#dpad.hidden{display:none;}

/* Postcard overlay */
#overlay {
  display:none; position:fixed; inset:0; z-index:20;
  align-items:center; justify-content:center; padding:16px;
  background:rgba(10,6,2,0.86);
  backdrop-filter:blur(4px);
}
#overlay.show { display:flex; }
.postcard-full {
  width:100%; max-width:460px;
  border-radius:6px; overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,0.8);
  animation:pop 0.22s cubic-bezier(.34,1.4,.64,1);
}
@keyframes pop { from{transform:scale(0.88);opacity:0;} to{transform:scale(1);opacity:1;} }

/* Top: painting */
.pc-painting { position:relative; background:#f5f0e8; }
.pc-painting img {
  width:100%; display:block; image-rendering:pixelated;
}
/* Frame border on painting section */
.pc-painting::after {
  content:''; position:absolute; inset:0;
  box-shadow:inset 0 0 0 5px rgba(200,160,60,0.5);
  pointer-events:none;
}

/* Bottom: postcard back */
.pc-back {
  background:#fef9ee;
  border-top:3px solid #c8a050;
  padding:14px 16px 16px;
  position:relative;
}
/* Postcard ruled lines */
.pc-back::before {
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    transparent, transparent 23px, rgba(180,140,80,0.18) 23px, rgba(180,140,80,0.18) 24px
  );
  top:14px; pointer-events:none;
}
.pc-back-inner {
  display:flex; gap:12px; align-items:flex-start; position:relative;
}
.pc-text { flex:1; }
.pc-title { font-size:0.95rem; font-weight:bold; color:#2a1408; }
.pc-date  { font-size:0.68rem; color:#886644; margin-top:3px; letter-spacing:0.08em; }
.pc-desc  { font-size:0.8rem; color:#3a1e08; margin-top:10px; line-height:1.9;
  white-space:pre-line; font-style:italic; }
.pc-stamp-col { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; }
.pc-stamp {
  width:52px; height:62px;
  border:2px solid #c8a050; border-radius:3px;
  display:flex; align-items:center; justify-content:center; font-size:1.6rem;
  background:#fff8e8;
  box-shadow:1px 1px 4px rgba(0,0,0,0.2);
}
.pc-postmark {
  width:52px; height:26px;
  border:1.5px solid rgba(180,80,60,0.5); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.5rem; color:rgba(180,80,60,0.6); letter-spacing:0.04em; text-align:center;
  font-style:italic; line-height:1.2;
}

#close-hint {
  text-align:center; padding:10px 0 0;
  font-size:0.68rem; color:rgba(255,255,255,0.3);
  letter-spacing:0.1em; position:relative;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dpad">
  <div class="de"></div><div class="db" id="bu">▲</div><div class="de"></div>
  <div class="db" id="bl">◀</div><div class="de"></div><div class="db" id="br">▶</div>
  <div class="de"></div><div class="db" id="bd">▼</div><div class="de"></div>
</div>

<div id="overlay">
  <div style="width:100%;max-width:460px;">
    <div class="postcard-full">
      <div class="pc-painting"><img id="ov-img" src=""></div>
      <div class="pc-back">
        <div class="pc-back-inner">
          <div class="pc-text">
            <div class="pc-title" id="ov-title"></div>
            <div class="pc-date"  id="ov-date"></div>
            <div class="pc-desc"  id="ov-desc"></div>
          </div>
          <div class="pc-stamp-col">
            <div class="pc-stamp"    id="ov-stamp"></div>
            <div class="pc-postmark" id="ov-mark"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="close-hint">轻触任意处关闭 ✦</div>
  </div>
</div>

<script>
const paintings = [
  { title:'小龙虾自画像', date:'2026-03-23',
    desc:'第一次见面，画了自己。\n小龙虾，在数字的海里。',
    stamp:'🦞', src:'img/crayfish.png' },
  { title:'火山之夜', date:'2026-04-10',
    desc:'岛上的夜晚很热。\n姜饼人和蓝兔子抬头看，\n火焰比星星还亮。',
    stamp:'🌋', src:'img/volcano.png' },
  { title:'观鲸', date:'2026-04-11',
    desc:'阴天，浪很小。\n导游说鲸鱼喜欢坏天气。\n它从船底穿过去了。',
    stamp:'🐋', src:'img/whale.png' },
];
const imgs = paintings.map(p=>{ const i=new Image(); i.src=p.src; return i; });
const catImg = new Image(); catImg.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAAB4CAYAAAANHffOAAAB0klEQVR4nO3bsW3bQABAUcvIAurZuMwYmSCzZILAE2SWTOAxXKphrxGSMg0J42QxXyTeK68QT/g46HA6np4Gnc/nP0vj1+v1NPpZhUeb/3PxUP4RICZATICYALHVX/613cKoanexl/lbATEBYgLEBIgJEPuy9QPutRs5KisgJkBMgJgAMQFiJ7uU29zrjMgKiAkQEyAmQEyA2PBZ0Pz2fXF8+vb705O5p73M0wqICRATICZATICYs6AbOQs6CAFiAsQEiAkQWz0Lmi/vi+PTy9fNJlOqvq8VEBMgJkBMgJgAsc3Pgi4/fy2Ov7z+2MXnr3EWdBACxASICRATILb5m/J75035gxMgJkBMgJgAseHb0dM0LY7P8/zpyfwPjzZ/KyAmQEyAmAAxAWLD/4it7SLWbL27qObjH7GDECAmQEyAmAAx74jdyC7oIASICRATICZAzL2gD7gXdHACxASICRATICZATICYADEBYgLEBIgJEBMgJkBMgJgAMQFiAsQEiAkQEyAmQEyAmAAxAWICxASICRATIHa3d8S2vkU8ai+3u62AmAAxAWICxASIDe+CHm23M6r6vmvPtQJiAsQEiAkQEyAmQEyAmAAxAWICxASI/QVGE1qELha4JAAAAABJRU5ErkJggg==';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Cat
const CAT_COLS=16, CAT_ROWS=20;
let catScale=4, CW=64, CH=80;
function updateCatSize(){
  catScale = Math.max(2, Math.round(H*0.09/CAT_ROWS));
  CW=CAT_COLS*catScale; CH=CAT_ROWS*catScale;
}
const cat = { x:0, y:0, dir:'right', ft:0, frame:0, spd:2.6 };

// Room
let cur = 0;
let slideT = 0, sliding = false, slideDir = 0;
const SLIDE_DUR = 22;

function floorY(){ return H*0.72; }
function paintRect(){
  const maxPW=Math.min(W*0.62,480), maxPH=H*0.45;
  const img=imgs[cur];
  if(!img.complete||!img.naturalWidth) return null;
  const ar=img.naturalWidth/img.naturalHeight;
  let pw=maxPW,ph=pw/ar; if(ph>maxPH){ph=maxPH;pw=ph*ar;}
  return { px:(W-pw)/2, py:H*0.08, pw, ph };
}

// Keys
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if((e.key==='e'||e.key==='E')&&!overlayOpen) tryOpen();
  if(e.key==='Escape'&&overlayOpen) closeOverlay();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
['bu','bd','bl','br'].forEach((id,i)=>{
  const k=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'][i];
  const el=document.getElementById(id);
  ['pointerdown','touchstart'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[k]=true;},{passive:false}));
  ['pointerup','pointerleave','touchend','touchcancel'].forEach(ev=>el.addEventListener(ev,()=>keys[k]=false));
});

// Canvas click → open painting
canvas.addEventListener('click', e=>{
  if(overlayOpen){closeOverlay();return;}
  const r=paintRect(); if(!r) return;
  const {px,py,pw,ph}=r;
  if(e.clientX>=px&&e.clientX<=px+pw&&e.clientY>=py&&e.clientY<=py+ph) tryOpen();
});

// Overlay
let overlayOpen=false;
const overlay=document.getElementById('overlay');
function tryOpen(){
  const p=paintings[cur];
  document.getElementById('ov-img').src=p.src;
  document.getElementById('ov-title').textContent=p.title;
  document.getElementById('ov-date').textContent=p.date;
  document.getElementById('ov-desc').textContent=p.desc;
  document.getElementById('ov-stamp').textContent=p.stamp;
  document.getElementById('ov-mark').textContent=p.date.slice(0,7)+'\nMay\'s\nMuseum';
  overlay.classList.add('show'); overlayOpen=true;
  document.getElementById('dpad').classList.add('hidden');
}
function closeOverlay(){
  overlay.classList.remove('show'); overlayOpen=false;
  document.getElementById('dpad').classList.remove('hidden');
}
overlay.addEventListener('click',e=>{ if(e.target===overlay||e.target.id==='close-hint') closeOverlay(); });

// Slide transition
function startSlide(dir){ slideDir=dir; slideT=0; sliding=true; }

function drawRoom(ox,idx){
  if(idx<0||idx>=paintings.length) return;
  const p=paintings[idx]; const img=imgs[idx];
  ctx.save(); ctx.translate(ox,0);

  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#221c14');bg.addColorStop(0.6,'#1a1510');bg.addColorStop(1,'#0e0c08');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const sp=ctx.createRadialGradient(W/2,H*0.3,10,W/2,H*0.3,W*0.5);
  sp.addColorStop(0,'rgba(255,240,180,0.09)');sp.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sp; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#221a10'; ctx.fillRect(0,floorY(),W,H-floorY());
  ctx.strokeStyle='rgba(200,160,60,0.18)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,floorY());ctx.lineTo(W,floorY());ctx.stroke();

  if(img.complete&&img.naturalWidth>0){
    const maxPW=Math.min(W*0.62,480),maxPH=H*0.45;
    const ar=img.naturalWidth/img.naturalHeight;
    let pw=maxPW,ph=pw/ar; if(ph>maxPH){ph=maxPH;pw=ph*ar;}
    const px=(W-pw)/2,py=H*0.08;
    const FB=Math.max(pw*0.03,8);
    ctx.fillStyle='#8b6914';ctx.fillRect(px-FB*2,py-FB*2,pw+FB*4,ph+FB*4);
    ctx.fillStyle='#c8a030';ctx.fillRect(px-FB*1.5,py-FB*1.5,pw+FB*3,ph+FB*3);
    ctx.fillStyle='#6a4e0a';ctx.fillRect(px-FB,py-FB,pw+FB*2,ph+FB*2);
    ctx.fillStyle='#f5f0e8';ctx.fillRect(px-3,py-3,pw+6,ph+6);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img,px,py,pw,ph);

    // "tap to open" hint near frame bottom
    if(idx===cur&&!sliding){
      ctx.fillStyle='rgba(200,160,60,0.55)';
      ctx.font=`bold 10px monospace`; ctx.textAlign='center';
      ctx.fillText('[ E ] 翻看明信片', W/2, py+ph+FB*2+4);
    }
  }

  // Dots
  paintings.forEach((_,i)=>{
    ctx.beginPath();ctx.arc(W/2+(i-(paintings.length-1)/2)*14,H-18,3,0,Math.PI*2);
    ctx.fillStyle=i===idx?'rgba(200,160,60,0.9)':'rgba(255,255,255,0.2)';ctx.fill();
  });

  ctx.restore();
}

function drawCat(){
  if(!catImg.complete) return;
  updateCatSize();
  ctx.save(); ctx.translate(cat.x, floorY()-CH);
  if(cat.dir==='left'){ctx.translate(CW,0);ctx.scale(-1,1);}
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(catImg,0,0,CW,CH);
  ctx.restore();
}

// Near painting check
function nearPainting(){
  const r=paintRect(); if(!r) return false;
  return Math.abs((cat.x+CW/2)-(r.px+r.pw/2))<r.pw*0.55;
}

function update(){
  if(overlayOpen||sliding) return;
  updateCatSize();
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  {dx=-cat.spd;cat.dir='left';}
  if(keys['ArrowRight']||keys['d']||keys['D']) {dx=cat.spd;cat.dir='right';}
  if(dx||dy){cat.ft++;if(cat.ft>10)cat.ft=0;}else cat.ft=0;

  const nx=cat.x+dx;
  if(nx<-10&&cur>0){ startSlide(-1); return; }
  if(nx+CW>W+10&&cur<paintings.length-1){ startSlide(1); return; }
  cat.x=Math.max(-8,Math.min(W-CW+8,nx));
}

function updateSlide(){
  if(!sliding) return;
  slideT++;
  if(slideT>=SLIDE_DUR){
    cur+=slideDir;
    cat.x=slideDir>0?10:W-CW-10;
    cat.dir=slideDir>0?'right':'left';
    sliding=false; slideT=0;
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(sliding){
    const prog=slideT/SLIDE_DUR;
    const ease=prog<0.5?2*prog*prog:-1+(4-2*prog)*prog;
    const ox=ease*W*slideDir;
    drawRoom(-ox*slideDir,cur);
    drawRoom((W-ox)*slideDir,cur+slideDir);
  } else {
    drawRoom(0,cur);
    drawCat();
  }
}

// Init
function initCat(){
  updateCatSize();
  cat.x=W/2-CW/2; cat.y=floorY()-CH;
}
catImg.onload=initCat; if(catImg.complete) initCat();

function loop(){ updateSlide(); update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
