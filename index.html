<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>May 的博物馆</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height: 100%; width: 100%;
  background: #1c1812;
  font-family: 'PingFang SC', 'Hiragino Sans', serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  user-select: none;
}

/* Museum wall */
.wall {
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  background:
    radial-gradient(ellipse at 50% 40%, #2e2820 0%, #1a1510 60%, #0e0c0a 100%);
}

/* Spotlight on painting */
.spotlight {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 60vw; height: 100vh;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,240,180,0.07) 0%, transparent 65%);
  pointer-events: none;
}

/* Frame */
.frame-wrap {
  position: relative;
  display: flex; flex-direction: column; align-items: center;
  animation: fadein 0.5s ease;
}
@keyframes fadein {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

.frame-outer {
  background: #8b6914;
  padding: 10px;
  border-radius: 3px;
  box-shadow:
    0 0 0 2px #6a4e0a,
    0 0 0 4px #c8a030,
    0 0 0 6px #6a4e0a,
    0 8px 40px rgba(0,0,0,0.8),
    0 0 80px rgba(200,160,40,0.08);
}
.frame-inner {
  background: #f5f0e8;
  padding: 6px;
}
.frame-inner img {
  display: block;
  image-rendering: pixelated;
  max-width: min(78vw, 560px);
  max-height: 52vh;
  width: auto; height: auto;
}

/* Label plate */
.label {
  margin-top: 22px;
  background: #f5ecd5;
  border: 1px solid #c8a050;
  border-radius: 3px;
  padding: 10px 24px 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  min-width: 200px;
}
.label-title {
  font-size: 1rem;
  font-weight: bold;
  color: #2a1608;
  letter-spacing: 0.05em;
}
.label-date {
  font-size: 0.7rem;
  color: #886644;
  margin-top: 4px;
  letter-spacing: 0.1em;
}
.label-desc {
  font-size: 0.78rem;
  color: #4a2c14;
  margin-top: 8px;
  line-height: 1.75;
  white-space: pre-line;
}

/* Nav arrows */
.nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px; color: rgba(255,255,255,0.6);
  transition: background 0.15s, color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav:hover { background: rgba(255,255,255,0.15); color: #fff; }
.nav:active { background: rgba(255,255,255,0.25); }
#nav-prev { left: max(16px, 3vw); }
#nav-next { right: max(16px, 3vw); }
.nav.hidden { opacity: 0; pointer-events: none; }

/* Dot indicators */
.dots {
  position: absolute;
  bottom: 28px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: background 0.2s;
}
.dot.active { background: rgba(200,160,60,0.8); }

/* Cat bottom right */
.cat {
  position: absolute;
  bottom: 16px; right: 20px;
  width: 52px; image-rendering: pixelated;
  opacity: 0.85;
}

/* Top title */
.museum-title {
  position: absolute;
  top: 20px; left: 50%; transform: translateX(-50%);
  font-size: 0.68rem;
  letter-spacing: 0.28em;
  color: rgba(200,160,60,0.45);
  white-space: nowrap;
}
</style>
</head>
<body>
<div class="wall">
  <div class="spotlight"></div>
  <div class="museum-title">MAY'S MUSEUM · 旅途寄来的画</div>

  <div class="frame-wrap" id="frame-wrap">
    <div class="frame-outer">
      <div class="frame-inner">
        <img id="painting" src="" alt="">
      </div>
    </div>
    <div class="label">
      <div class="label-title" id="lbl-title"></div>
      <div class="label-date"  id="lbl-date"></div>
      <div class="label-desc"  id="lbl-desc"></div>
    </div>
  </div>

  <div class="nav" id="nav-prev">‹</div>
  <div class="nav" id="nav-next">›</div>

  <div class="dots" id="dots"></div>
  <img class="cat" src="img/cat.png" alt="小黑猫">
</div>

<script>
const paintings = [
  { title:'小龙虾自画像', date:'2026-03-23', desc:'第一次见面，画了自己。\n小龙虾，在数字的海里。', src:'img/crayfish.png' },
  { title:'火山之夜',     date:'2026-04-10', desc:'岛上的夜晚很热。\n姜饼人和蓝兔子抬头看，\n火焰比星星还亮。', src:'img/volcano.png' },
  { title:'观鲸',         date:'2026-04-11', desc:'阴天，浪很小。\n导游说鲸鱼喜欢坏天气。\n它从船底穿过去了。', src:'img/whale.png' },
];

let cur = 0;

const painting  = document.getElementById('painting');
const lblTitle  = document.getElementById('lbl-title');
const lblDate   = document.getElementById('lbl-date');
const lblDesc   = document.getElementById('lbl-desc');
const frameWrap = document.getElementById('frame-wrap');
const navPrev   = document.getElementById('nav-prev');
const navNext   = document.getElementById('nav-next');
const dotsEl    = document.getElementById('dots');

// Build dots
paintings.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' active':'');
  d.addEventListener('click', () => go(i));
  dotsEl.appendChild(d);
});

function show(i, dir=1) {
  cur = i;
  const p = paintings[i];
  // animate
  frameWrap.style.animation = 'none';
  frameWrap.offsetHeight;
  frameWrap.style.animation = '';

  painting.src    = p.src;
  lblTitle.textContent = p.title;
  lblDate.textContent  = p.date;
  lblDesc.textContent  = p.desc;

  navPrev.classList.toggle('hidden', i === 0);
  navNext.classList.toggle('hidden', i === paintings.length - 1);

  document.querySelectorAll('.dot').forEach((d,j) =>
    d.classList.toggle('active', j===i));
}

function go(i) {
  if (i < 0 || i >= paintings.length) return;
  show(i);
}

navPrev.addEventListener('click', () => go(cur - 1));
navNext.addEventListener('click', () => go(cur + 1));

// Swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(dx < 0 ? cur+1 : cur-1);
}, {passive:true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') go(cur+1);
  if (e.key==='ArrowLeft')  go(cur-1);
});

show(0);
</script>
</body>
</html>
