<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>May 的像素画廊</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d0d1a;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh;
  font-family:'PingFang SC','Hiragino Sans',sans-serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}
#wrap { position:relative; display:inline-block; }
canvas { display:block; image-rendering:pixelated; border:2px solid #2a3a5a; border-radius:4px; }
#hint { color:#445566; font-size:11px; margin-top:8px; letter-spacing:0.08em; text-align:center; padding:0 10px; }

/* D-pad */
#dpad {
  position:absolute; bottom:52px; right:12px;
  display:grid; grid-template-columns:repeat(3,40px); grid-template-rows:repeat(3,40px);
  gap:3px;
}
.dpad-btn {
  width:40px; height:40px;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:rgba(255,255,255,0.7);
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.dpad-btn:active { background:rgba(255,255,255,0.28); }
.dpad-empty { visibility:hidden; }

/* Overlay */
#overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.9);
  flex-direction:column; align-items:center; justify-content:center;
  z-index:99; padding:20px;
}
#overlay.show { display:flex; }
#overlay img {
  max-width:90vw; max-height:55vh;
  image-rendering:pixelated; border:3px solid #8b6914;
  border-radius:3px;
}
#overlay .info { color:#f0dfa0; text-align:center; margin-top:16px; }
#overlay .info .title { font-size:1.2rem; font-weight:bold; }
#overlay .info .date  { font-size:0.78rem; color:#6688aa; margin-top:6px; }
#overlay .info .desc  { font-size:0.85rem; color:#a8b8c8; margin-top:8px; line-height:1.6; }
#overlay .close-btn {
  margin-top:20px; padding:10px 28px;
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
  border-radius:8px; color:#aaa; font-size:13px; cursor:pointer;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="520"></canvas>
  <div id="dpad">
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-up">▲</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-left">◀</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-right">▶</div>
    <div class="dpad-empty"></div>
    <div class="dpad-btn" id="btn-down">▼</div>
    <div class="dpad-empty"></div>
  </div>
</div>
<div id="hint">方向键 / WASD / 摇杆移动 · 靠近画作按 E 或点击画框欣赏</div>

<div id="overlay">
  <img id="ov-img" src="">
  <div class="info">
    <div class="title" id="ov-title"></div>
    <div class="date"  id="ov-date"></div>
    <div class="desc"  id="ov-desc"></div>
  </div>
  <div class="close-btn" id="close-btn">关闭</div>
</div>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Responsive scale
function getScale() {
  const vw = window.innerWidth;
  if (vw < 420) return 0.48;
  if (vw < 600) return 0.65;
  if (vw < 850) return 0.85;
  return 1;
}
let SCALE = getScale();
function applyScale() {
  SCALE = getScale();
  canvas.style.width  = (800 * SCALE) + 'px';
  canvas.style.height = (520 * SCALE) + 'px';
}
applyScale();
window.addEventListener('resize', applyScale);

  return row;
});
const CAT_COLORS = {1:'#111',2:'#2d2d2d',3:'#f5f0e8',4:'#f5d060',5:'#f090a0'};

function drawCat(x, y, frame, dir) {
  const grid = frame===0 ? CAT_A : CAT_B;
  ctx.save(); ctx.translate(x, y);
  if (dir==='left') { ctx.translate(12*PS,0); ctx.scale(-1,1); }
  for (let r=0;r<grid.length;r++) for (let c=0;c<grid[r].length;c++) {
    const v=grid[r][c]; if (!v) continue;
    ctx.fillStyle=CAT_COLORS[v];
    ctx.fillRect(c*PS, r*PS, PS, PS);
  }
  ctx.restore();
}

function drawFloor() {
  const T=28;
  for (let y=FLOOR_Y1;y<FLOOR_Y2;y+=T) for (let x=FLOOR_X1;x<FLOOR_X2;x+=T) {
    ctx.fillStyle = ((x/T)+(y/T))%2===0 ? '#3e2e1e' : '#362818';
    ctx.fillRect(x,y,Math.min(T,FLOOR_X2-x),Math.min(T,FLOOR_Y2-y));
  }
  ctx.strokeStyle='rgba(0,0,0,0.18)'; ctx.lineWidth=1;
  for (let x=FLOOR_X1;x<=FLOOR_X2;x+=T){ctx.beginPath();ctx.moveTo(x,FLOOR_Y1);ctx.lineTo(x,FLOOR_Y2);ctx.stroke();}
  for (let y=FLOOR_Y1;y<=FLOOR_Y2;y+=T){ctx.beginPath();ctx.moveTo(FLOOR_X1,y);ctx.lineTo(FLOOR_X2,y);ctx.stroke();}
}

function drawWalls() {
  ctx.fillStyle='#1e1632'; ctx.fillRect(0,0,CW,NORTH_H);
  ctx.fillStyle='#2e2248'; ctx.fillRect(0,NORTH_H-6,CW,6);
  ctx.fillStyle='#3d2d58'; ctx.fillRect(0,NORTH_H-3,CW,2);
  ctx.fillStyle='#1a1228';
  ctx.fillRect(0,NORTH_H,SIDE_W,CH-NORTH_H);
  ctx.fillRect(CW-SIDE_W,NORTH_H,SIDE_W,CH-NORTH_H);
  ctx.fillRect(0,FLOOR_Y2,CW,SOUTH_H);
  ctx.fillStyle='#2e2248';
  ctx.fillRect(SIDE_W-3,NORTH_H,3,FLOOR_Y2-NORTH_H);
  ctx.fillRect(CW-SIDE_W,NORTH_H,3,FLOOR_Y2-NORTH_H);
  ctx.fillStyle='#4a3870'; ctx.font='bold 11px monospace';
  ctx.textAlign='right'; ctx.fillText("MAY'S PIXEL GALLERY", CW-12, CH-14);
}

function drawPainting(p, near) {
  const {fx,fy,img}=p; const B=8;
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fillRect(fx+4,fy+4,PW,PH);
  ctx.fillStyle=near?'#c8a030':'#8b6914'; ctx.fillRect(fx,fy,PW,PH);
  ctx.fillStyle=near?'#9a7810':'#5a4208'; ctx.fillRect(fx+2,fy+2,PW-4,PH-4);
  ctx.fillStyle='#f5f0e8'; ctx.fillRect(fx+B-2,fy+B-2,PW-(B-2)*2,PH-(B-2)*2);
  if (img.complete) ctx.drawImage(img,fx+B,fy+B,PW-B*2,PH-B*2);
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(fx+B,fy+B,(PW-B*2)*0.4,6);
  ctx.fillStyle=near?'#f0dfa0':'#887868';
  ctx.font=(near?'bold ':'')+"10px 'PingFang SC',sans-serif";
  ctx.textAlign='center'; ctx.fillText(p.title,fx+PW/2,fy+PH+14);
}

const keys = {};

// Keyboard
document.addEventListener('keydown', e => {
  keys[e.key]=true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if ((e.key==='e'||e.key==='E') && nearPainting>=0 && !overlayOpen) openOverlay(nearPainting);
  if ((e.key==='Escape'||e.key==='e'||e.key==='E') && overlayOpen) closeOverlay();
});
document.addEventListener('keyup', e => { keys[e.key]=false; });

// D-pad buttons
function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e => { e.preventDefault(); keys[key]=true; });
  el.addEventListener('pointerup',   e => { e.preventDefault(); keys[key]=false; });
  el.addEventListener('pointerleave',e => { keys[key]=false; });
}
bindBtn('btn-up',    'ArrowUp');
bindBtn('btn-down',  'ArrowDown');
bindBtn('btn-left',  'ArrowLeft');
bindBtn('btn-right', 'ArrowRight');

// Click on canvas → check painting tap
canvas.addEventListener('click', e => {
  if (overlayOpen) { closeOverlay(); return; }
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / SCALE;
  const cy = (e.clientY - rect.top)  / SCALE;
  for (let i=0;i<paintings.length;i++) {
    const p=paintings[i];
    if (cx>=p.fx && cx<=p.fx+PW && cy>=p.fy && cy<=p.fy+PH) {
      openOverlay(i); return;
    }
  }
});

let overlayOpen=false, nearPainting=-1;
const ovEl=document.getElementById('overlay');
const ovImg=document.getElementById('ov-img');
const ovTitle=document.getElementById('ov-title');
const ovDate=document.getElementById('ov-date');
const ovDesc=document.getElementById('ov-desc');
document.getElementById('close-btn').addEventListener('click', closeOverlay);
ovEl.addEventListener('click', e => { if(e.target===ovEl) closeOverlay(); });

function openOverlay(i) {
  const p=paintings[i];
  ovImg.src=p.src; ovTitle.textContent=p.title;
  ovDate.textContent=p.date; ovDesc.textContent=p.desc;
  ovEl.classList.add('show'); overlayOpen=true;
}
function closeOverlay() { ovEl.classList.remove('show'); overlayOpen=false; }

function checkProximity() {
  nearPainting=-1;
  const cx=cat.x+CAT_W/2, cy=cat.y;
  for (let i=0;i<paintings.length;i++) {
    const p=paintings[i];
    if (Math.abs(cx-(p.fx+PW/2))<100 && cy<FLOOR_Y1+80) { nearPainting=i; break; }
  }
}

function update() {
  if (overlayOpen) return;
  let dx=0,dy=0;
  if (keys['ArrowLeft'] ||keys['a']||keys['A']) { dx=-cat.spd; cat.dir='left'; }
  if (keys['ArrowRight']||keys['d']||keys['D']) { dx= cat.spd; cat.dir='right'; }
  if (keys['ArrowUp']   ||keys['w']||keys['W']) dy=-cat.spd;
  if (keys['ArrowDown'] ||keys['s']||keys['S']) dy= cat.spd;
  const moving=dx!==0||dy!==0;
  if (moving) { cat.ft++; if(cat.ft>12){cat.ft=0;cat.frame=1-cat.frame;} } else cat.frame=0;
  const nx=cat.x+dx, ny=cat.y+dy;
  if (nx>=FLOOR_X1 && nx+CAT_W<=FLOOR_X2) cat.x=nx;
  if (ny>=NORTH_H-10 && ny+CAT_H<=FLOOR_Y2) cat.y=ny;
  checkProximity();
}

function draw() {
  ctx.clearRect(0,0,CW,CH);
  drawWalls(); drawFloor();
  for (let i=0;i<paintings.length;i++) drawPainting(paintings[i], nearPainting===i);
  if (nearPainting>=0 && !overlayOpen) {
    const p=paintings[nearPainting];
    const px=p.fx+PW/2, py=FLOOR_Y1+36;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(px-52,py-14,104,22,4); ctx.fill();
    ctx.fillStyle='#f5e8a0'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
    ctx.fillText('[ E ]  欣赏', px, py+2);
  }
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(cat.x+CAT_W/2,cat.y+CAT_H,CAT_W*0.4,4,0,0,Math.PI*2); ctx.fill();
  drawCat(cat.x, cat.y, cat.frame, cat.dir);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
