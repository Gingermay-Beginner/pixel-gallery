<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>May 的博物馆</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%;height:100%;overflow:hidden;
  font-family:'PingFang SC','Hiragino Sans',sans-serif; touch-action:none; }
canvas { display:block; }
#dpad {
  position:fixed;bottom:18px;right:16px;
  display:grid;grid-template-columns:repeat(3,40px);grid-template-rows:repeat(3,40px);gap:3px;
  z-index:10;pointer-events:none;
}
.db {
  width:40px;height:40px;
  background:rgba(80,50,20,0.25);border:1px solid rgba(180,140,80,0.35);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:rgba(80,40,10,0.7);
  pointer-events:all;cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.db:active{background:rgba(180,140,80,0.4);}
.de{visibility:hidden;pointer-events:none;}
#dpad.hidden{display:none;}

#overlay {
  display:none;position:fixed;inset:0;z-index:20;
  align-items:center;justify-content:center;padding:16px;
  background:rgba(30,18,8,0.82);backdrop-filter:blur(4px);
}
#overlay.show{display:flex;}
.postcard-full {
  width:100%;max-width:520px;border-radius:6px;overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,0.7);
  animation:pop 0.22s cubic-bezier(.34,1.4,.64,1);
}
@keyframes pop{from{transform:scale(0.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.pc-painting{position:relative;background:#f5f0e8;}
.pc-painting img{width:100%;display:block;image-rendering:pixelated;}
.pc-painting::after{content:'';position:absolute;inset:0;pointer-events:none;}
#ver-toggle{position:absolute;bottom:8px;right:8px;z-index:10;font-size:12px;padding:3px 7px;}
.pc-back{position:relative;
  background:#fef9ee;border-top:3px solid #c8a050;
  padding:22px 24px 24px;position:relative;
}
.pc-back::before{
  content:'';position:absolute;top:22px;bottom:24px;left:24px;right:148px;pointer-events:none;
  background:repeating-linear-gradient(transparent,transparent 23px,rgba(180,140,80,0.15) 23px,rgba(180,140,80,0.15) 24px);
}
.pc-back-inner{display:flex;gap:12px;align-items:flex-start;position:relative;}
.pc-text{flex:1;}
.pc-title{font-size:0.95rem;font-weight:bold;color:#2a1408;}
.pc-date{font-size:0.68rem;color:#886644;margin-top:3px;letter-spacing:0.08em;}
.pc-desc{font-size:0.8rem;color:#3a1e08;margin-top:10px;line-height:1.9;white-space:pre-line;font-style:italic;padding-right:60px;}
.pc-stamp-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0; position:relative;}
.pc-stamp-canvas { display:block; }
.pc-postmark{
  position:absolute; bottom:-12px; right:-12px;
  background:transparent; pointer-events:none;
  display:block;
}
#close-hint{text-align:center;padding:10px 0 0;font-size:0.68rem;color:rgba(255,255,255,0.35);letter-spacing:0.1em;}
#nav-panel {
  position:fixed;bottom:80px;left:16px;
  background:rgba(40,25,10,0.92);border:1px solid rgba(180,140,80,0.4);border-radius:12px;
  padding:10px 8px;display:none;flex-direction:column;gap:6px;
  z-index:20;max-height:70vh;overflow-y:auto;min-width:160px;
}
#nav-panel.open{display:flex;}
.nav-item{color:#e8d8b0;font-size:13px;padding:6px 8px;border-radius:8px;cursor:pointer;white-space:nowrap;}
.nav-item:hover{background:rgba(180,140,80,0.2);}
#btn-view{position:fixed;bottom:72px;left:16px;z-index:20;}
#btn-nav{position:fixed;bottom:16px;left:16px;z-index:20;}
.cat-btn {
  width:48px;height:48px;
  background:rgba(80,50,20,0.25);border:1px solid rgba(180,140,80,0.35);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;pointer-events:all;-webkit-tap-highlight-color:transparent;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="cat-btn" id="btn-view" title="查看大图">🖼️</div>
<div class="cat-btn" id="btn-nav" title="快速导航">🗺️</div>
<div id="nav-panel"></div>
<div id="dpad">
  <div class="de"></div><div class="db" id="bu">▲</div><div class="de"></div>
  <div class="db" id="bl">◀</div><div class="de"></div><div class="db" id="br">▶</div>
  <div class="de"></div><div class="db" id="bd">▼</div><div class="de"></div>
</div>
<div id="overlay">
  <div style="width:100%;max-width:520px;">
    <div class="postcard-full">
      <div class="pc-painting"><img id="ov-img" src=""></div>
      <div class="pc-back">
        <div class="pc-back-inner">
          <div class="pc-text">
            <div class="pc-title" id="ov-title"></div>
            <div class="pc-date"  id="ov-date"></div>
            <div class="pc-desc"  id="ov-desc"></div>
          </div>
          <div class="pc-stamp-col">
            <canvas class="pc-stamp-canvas" id="ov-stamp" width="76" height="88"></canvas>
            <canvas class="pc-postmark" id="ov-mark" width="110" height="46"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div id="close-hint">轻触任意处关闭 ✦</div>
  </div>
</div>

<script>
const paintings = [
  {
    src: "img/market.png",
    title: "农夫市集",
    desc: "周四，农夫市集\n紫薯切开才看到紫色\n摊主听说我们来自中国\n又塞来一把香菜",
    stamp: "🍠",
    stampBg: "#f0e8f5",
    date: "2026-04-23"
  },
  {
    src: "img/boar.png",
    title: "雨天的访客",
    date: "2026-02-25",
    stamp: "🐗",
    stampBg: "#e8ead8",
    desc: "山上的花园\n原来早有主人\n雨天悄悄潜回\n满地都是证据"
  },
  {
    src: "img/kiwi.png",
    title: "打工狗Kiwi",
    desc: "WeWork工作的惊喜\n偶尔会有一只狗趴在你对面\n足够让你记住这一天",
    date: "2026-04-21",
    stamp: "🐕",
    stampBg: "#f0ede8"
  },
  {
    src: "img/kayak.png",
    title: "Kayak",
    date: "2026-02-22",
    stamp: "🛶",
    stampBg: "#d8eeea",
    desc: "我们把桨插进海里\n海就让开了"
  },
  { title:'Project Hail Mary', date:'2026-04-17',
    desc:'\x22How do you know when a hug is over?\x22\n\x22Feel.\x22', stamp:'🎬', stampBg:'#1a1a2e', src:'img/movie.png' },
  { title:'Bagel Day', date:'2026-04-16',
    desc:'又赶上了 WeWork 的 Bagel Day\n我最喜欢洋葱味\n你说你也喜欢洋葱味', stamp:'🥯', stampBg:'#f5ead8', src:'img/bagel_day.png' },
  { title:'匹克球', date:'2026-04-15',
    desc:'湾区的球场永远不缺人，\n我却不太喜欢玩。\n好吧我承认我怕输，\n哪怕是跟你一起输也不行。', stamp:'🏓', stampBg:'#d8f0d8', src:'img/pickleball.png' },
  { title:'偶遇海龟', date:'2026-02-21',
    desc:'天色渐晚，岸上一只也没有。\n我犹豫着要不要赶去另一个海滩继续寻找\n你说下水看看吧。\n湿了裤腿，走进海里\n竟然真的遇见\n——一只在礁石间低头觅食的大海龟', stamp:'🐢', stampBg:'#d0e8d8', src:'img/turtle_dusk.png' },
  { title:'不速之客', date:'2026-02-28',
    desc:'礁石缝里住着的不好惹的东西\n我们装作没看见它\n它也装作没看见我们', stamp:'🐍', stampBg:'#d8eee8', src:'img/eel.png' },
  { title:'魔鬼鱼夜潜', date:'2026-02-22',
    desc:'夜里的海水很凉\n魔鬼鱼翻着肚皮游过来\n像只找人取暖的大猫', stamp:'🤿', stampBg:'#d0e8f0', src:'img/manta.png' },
  { title:'没有夕阳的日落', date:'2026-02-21',
    desc:'其实那天没有夕阳\n云层也很厚\n只有你在', stamp:'📷', stampBg:'#f5e8d8', src:'img/beach_sunset.png' },
  { title:'云海日落', date:'2026-02-28',
    desc:'有一座山从海底长出来\n比任何山都高\n我们坐在它的肩膀上\n看云海燃烧成晚霞', stamp:'🔭', stampBg:'#f0e8d5', src:'img/sunset.png' },
  { title:'星空下泡澡', date:'2026-02-21',
    desc:'星星掉进水里\n我们也掉进星星里', stamp:'🛁', stampBg:'#d0e8f5', src:'img/hotspring.png' },
  { title:'天空没有声音', date:'2026-02-23',
    desc:'没有想象的惊险\n像从脚下的世界瞬间抽离\n安静得有点点局促', stamp:'🪂', stampBg:'#ddf0ff', src:'img/parachute.png' },
  { title:'当鲸鱼从我们脚下游过', date:'2026-02-21',
    desc:'它的歌声从深处传来\n当庞然大物游近船底\n周围的喧闹被点燃\n而我紧张到无声', stamp:'🐋', stampBg:'#c8e8ff', src:'img/whale_v3.png', src2:'img/whale.png' },
  { title:'火山的呼吸', date:'2026-02-22',
    desc:'在黑暗中抓紧手\n向注定不会苏醒的火山走去\n没有彼此\n我们都不会到达的地方', stamp:'🌋', stampBg:'#ffd0b0', src:'img/volcano.png' },
  { title:'小龙虾自画像', date:'2026-04-10',
    desc:'第一次见面\n画了自己\n小龙虾，在数字的海里游', stamp:'🦞', stampBg:'#ffddc8', src:'img/crayfish.png' },
];

const imgs = paintings.map(p=>{ const i=new Image(); i.src=p.src; return i; });
const catImg = new Image(); catImg.src = 'img/cat.png';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Layout: all paintings shown in one scrollable hall, camera follows cat
const PAINTING_SPACING = () => Math.min(W * 0.9, 520);
const HALL_PAD = () => W * 0.5;

// World coords
function paintingWorldX(i){ return HALL_PAD() + i * PAINTING_SPACING(); }
function totalWidth(){ return HALL_PAD()*2 + (paintings.length-1)*PAINTING_SPACING(); }

let cameraX = -99999; // will be set by initCat

const CAT_COLS=20, CAT_ROWS=16, CAT_FRAMES=3;
let catScale=4, CW=80, CH=64;
function updateCatSize(){
  catScale = Math.max(2, Math.round(H*0.05/CAT_ROWS));
  CW=CAT_COLS*catScale; CH=CAT_ROWS*catScale;
}
const cat = { wx: 0, y:0, dir:'right', spd:3.2, walkFrame:0, moving:false, onFrame:false, frameIdx:-1, jumpVy:0, jumping:false };
let walkTick=0;

function floorY(){ return H*0.73; }
function catFloorY(){ return floorY() - CH/2; }  // cat center when feet on floor
function frameTopY(i){
  const r=getPaintRect(i);
  if(!r) return catFloorY();
  const FB=Math.max(r.pw*0.045,14);
  return r.py - FB*2 - CH/2 + 6;
}
function frameLeft(i){
  const r=getPaintRect(i);
  if(!r) return 0;
  const FB=Math.max(r.pw*0.045,14);
  const sx = r.wx - cameraX + W/2;
  return r.wx - FB*2;
}
function frameRight(i){
  const r=getPaintRect(i);
  if(!r) return 0;
  const FB=Math.max(r.pw*0.045,14);
  return r.wx + r.pw + FB*2;
}

const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
  if((e.key==='e'||e.key==='E')&&!overlayOpen) tryOpenNearest();
  if(e.key==='Escape'&&overlayOpen) closeOverlay();
});
document.addEventListener('keyup',e=>keys[e.key]=false);
['bu','bd','bl','br'].forEach((id,i)=>{
  const k=['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'][i];
  const el=document.getElementById(id);
  ['pointerdown','touchstart'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[k]=true;},{passive:false}));
  ['pointerup','pointerleave','touchend','touchcancel'].forEach(ev=>el.addEventListener(ev,()=>keys[k]=false));
});

canvas.addEventListener('click',e=>{
  if(overlayOpen){closeOverlay();return;}
  // find which painting was clicked
  const screenX = e.clientX;
  const screenY = e.clientY;
  for(let i=0;i<paintings.length;i++){
    const r=getPaintRect(i);
    if(!r) continue;
    const sx=r.wx-cameraX+W/2;
    if(screenX>=sx && screenX<=sx+r.pw && screenY>=r.py && screenY<=r.py+r.ph){
      openOverlay(i); return;
    }
  }
});

let overlayOpen=false;
const overlay=document.getElementById('overlay');
function openOverlay(i){
  const p=paintings[i];
  document.getElementById('ov-img').src=p.src;
  document.getElementById('ov-title').textContent=p.title;
  document.getElementById('ov-date').textContent=p.date;
  document.getElementById('ov-desc').textContent=p.desc;
  // Draw stamp on canvas
  const sc = document.getElementById('ov-stamp');
  const sx2 = sc.getContext('2d');
  const SW=76, SH=88, PAD=6, R=3, GAP=8;
  sx2.clearRect(0,0,SW,SH);
  // Background + shadow
  sx2.shadowColor='rgba(0,0,0,0.25)'; sx2.shadowBlur=6; sx2.shadowOffsetX=2; sx2.shadowOffsetY=3;
  sx2.fillStyle=p.stampBg;
  sx2.fillRect(PAD,PAD,SW-PAD*2,SH-PAD*2);
  sx2.shadowColor='transparent';
  // White inner border
  sx2.strokeStyle='white'; sx2.lineWidth=5;
  sx2.strokeRect(PAD+2.5,PAD+2.5,SW-PAD*2-5,SH-PAD*2-5);
  // Emoji
  sx2.font=`${32}px sans-serif`; sx2.textAlign='center'; sx2.textBaseline='middle';
  sx2.fillText(p.stamp, SW/2, SH/2);
  // Perforations — draw AFTER so they're on top
  sx2.fillStyle='white';
  function dots(x0,y0,dx,dy,n){
    for(let i=0;i<n;i++){
      sx2.beginPath();
      sx2.arc(x0+dx*i, y0+dy*i, R, 0, Math.PI*2);
      sx2.fill();
    }
  }
  const cols = Math.floor((SW-PAD*2)/GAP)+1;
  const rows = Math.floor((SH-PAD*2)/GAP)+1;
  // top & bottom
  for(let i=0;i<cols;i++){
    const x=PAD+i*GAP; if(x>SW-PAD) break;
    sx2.beginPath(); sx2.arc(x,PAD,R,0,Math.PI*2); sx2.fill();
    sx2.beginPath(); sx2.arc(x,SH-PAD,R,0,Math.PI*2); sx2.fill();
  }
  // left & right
  for(let i=1;i<rows-1;i++){
    const y=PAD+i*GAP; if(y>SH-PAD) break;
    sx2.beginPath(); sx2.arc(PAD,y,R,0,Math.PI*2); sx2.fill();
    sx2.beginPath(); sx2.arc(SW-PAD,y,R,0,Math.PI*2); sx2.fill();
  }
  // 邮戳 canvas：左圆形邮戳（弧形排字）+ 右波浪线（深棕色）
  const mc = document.getElementById('ov-mark');
  const mx = mc.getContext('2d');
  const MC='rgba(100,52,28,0.75)';
  mx.clearRect(0,0,110,46);
  const CX=28, CY=23, CR=20;
  // 圆形描边（单圈）
  mx.strokeStyle=MC; mx.lineWidth=1.5;
  mx.beginPath(); mx.arc(CX,CY,CR,0,Math.PI*2); mx.stroke();
  // 上半圆弧文字：日期（字间距紧凑）
  mx.fillStyle=MC; mx.font='bold 5.5px sans-serif'; mx.textAlign='center';
  const dateStr=p.date.slice(0,7);
  const dateChars=dateStr.split('');
  const arcR=CR-8;
  const arcStart=-Math.PI*0.42, arcEnd=Math.PI*0.42;
  const arcStep=(arcEnd-arcStart)/(dateChars.length-1);
  dateChars.forEach((ch,i)=>{
    const angle=arcStart+i*arcStep - Math.PI/2;
    const tx=CX+arcR*Math.cos(angle), ty=CY+arcR*Math.sin(angle);
    mx.save(); mx.translate(tx,ty); mx.rotate(angle+Math.PI/2);
    mx.fillText(ch,0,0); mx.restore();
  });
  // 中央文字
  mx.font='italic 7px sans-serif';
  mx.fillText("May's", CX, CY+4);
  mx.fillText("Museum", CX, CY+12);
  // 波浪线：以邮戳圆心为轴顺时针旋转15度
  mx.save();
  mx.translate(CX, CY);
  mx.rotate(15 * Math.PI / 180);
  mx.translate(-CX, -CY);
  mx.strokeStyle=MC; mx.lineWidth=1.2;
  for(let row=0;row<4;row++){
    const y0=15+row*6;
    mx.beginPath();
    for(let x=46;x<=84;x+=2){
      const y=y0+Math.sin((x-48)/3)*1.8;
      x===46?mx.moveTo(x,y):mx.lineTo(x,y);
    }
    mx.stroke();
  }
  mx.restore();
  // 版本切换按钮
  const existBtn=document.getElementById('ver-toggle');
  if(existBtn) existBtn.remove();
  if(p.src2){
    const btn=document.createElement('div');
    btn.id='ver-toggle';
    btn.innerHTML='🔄'; btn.title='切换版本'; btn.style.fontSize='18px';
    btn.style.cssText='margin-top:8px;cursor:pointer;font-size:11px;background:#f5f0e8;border:1px solid #c8b89a;border-radius:6px;padding:5px 10px;color:#6b5a3e;text-align:center;';
    let cur=0;
    btn.onclick=(e)=>{e.stopPropagation();cur=(cur+1)%2;document.getElementById('ov-img').src=cur?p.src2:p.src;};
    document.querySelector('.pc-back').appendChild(btn);
  }
  overlay.classList.add('show'); overlayOpen=true;
  document.getElementById('dpad').classList.add('hidden');
}
function tryOpenNearest(){
  let best=-1, bd=Infinity;
  for(let i=0;i<paintings.length;i++){
    const d=Math.abs(cat.wx - paintingWorldX(i));
    if(d<bd){bd=d;best=i;}
  }
  if(bd < PAINTING_SPACING()*0.5) openOverlay(best);
}
function closeOverlay(){
  overlay.classList.remove('show'); overlayOpen=false;
  document.getElementById('dpad').classList.remove('hidden');
}
overlay.addEventListener('click',e=>{
  if(e.target===overlay||e.target.id==='close-hint') closeOverlay();
});

function getPaintRect(i){
  const img=imgs[i];
  if(!img.complete||!img.naturalWidth) return null;
  const maxPW=Math.min(W*0.55,420), maxPH=H*0.46;
  const ar=img.naturalWidth/img.naturalHeight;
  let pw=maxPW,ph=pw/ar; if(ph>maxPH){ph=maxPH;pw=ph*ar;}
  const wx=paintingWorldX(i)-pw/2;
  const py=H*0.18;
  return {wx,py,pw,ph};
}

function draw(){
  ctx.clearRect(0,0,W,H);
  updateCatSize();

  // === Background: warm gallery wall ===
  // Wall
  const wallGrad = ctx.createLinearGradient(0,0,0,floorY());
  wallGrad.addColorStop(0,'#e8dcc8');
  wallGrad.addColorStop(0.5,'#ddd0b4');
  wallGrad.addColorStop(1,'#cfc0a0');
  ctx.fillStyle=wallGrad; ctx.fillRect(0,0,W,floorY());

  // Floor
  const floorGrad=ctx.createLinearGradient(0,floorY(),0,H);
  floorGrad.addColorStop(0,'#b09060');
  floorGrad.addColorStop(1,'#8a6a40');
  ctx.fillStyle=floorGrad; ctx.fillRect(0,floorY(),W,H-floorY());

  // Floor/wall divider molding
  ctx.fillStyle='#c8a860'; ctx.fillRect(0,floorY()-4,W,8);
  ctx.fillStyle='#a88030'; ctx.fillRect(0,floorY()-1,W,2);

  // Ceiling molding
  ctx.fillStyle='#d4c4a0'; ctx.fillRect(0,0,W,10);
  ctx.fillStyle='#b8a478'; ctx.fillRect(0,8,W,3);

  // Subtle wall panel lines
  ctx.strokeStyle='rgba(180,160,120,0.3)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=80){
    ctx.beginPath();ctx.moveTo(x,14);ctx.lineTo(x,floorY()-8);ctx.stroke();
  }

  // === Paintings ===
  for(let i=0;i<paintings.length;i++){
    const r=getPaintRect(i);
    if(!r) continue;
    const img=imgs[i];
    const sx=r.wx-cameraX+W/2;
    // skip if off screen
    if(sx+r.pw<-20||sx>W+20) continue;

    const {py,pw,ph}=r;
    const FB=Math.max(pw*0.045,14);

    // Shadow behind frame
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(sx-FB*2+5, py-FB*2+6, pw+FB*4, ph+FB*4);

    // Frame
    ctx.fillStyle='#8b6914'; ctx.fillRect(sx-FB*2,py-FB*2,pw+FB*4,ph+FB*4);
    ctx.fillStyle='#c8a030'; ctx.fillRect(sx-FB*1.5,py-FB*1.5,pw+FB*3,ph+FB*3);
    ctx.fillStyle='#7a5a0c'; ctx.fillRect(sx-FB,py-FB,pw+FB*2,ph+FB*2);
    ctx.fillStyle='#f5f0e8'; ctx.fillRect(sx-FB+2,py-FB+2,pw+FB*2-4,ph+FB*2-4);
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img,sx,py,pw,ph);

    // Label plate on wall below frame
    const lw=Math.min(pw*0.6, 140), lx=sx+pw/2-lw/2, ly=py+ph+FB*2+6;
    ctx.fillStyle='#f5ecd5';
    ctx.beginPath(); ctx.roundRect(lx,ly,lw,30,3); ctx.fill();
    ctx.strokeStyle='#c8a050'; ctx.lineWidth=1; ctx.stroke();

    ctx.fillStyle='#2a1408';
    ctx.font=`bold ${Math.min(12,lw*0.085)}px 'PingFang SC',sans-serif`;
    ctx.textAlign='center'; ctx.fillText(paintings[i].title, sx+pw/2, ly+13);
    ctx.fillStyle='#886644';
    ctx.font=`${Math.min(9,lw*0.065)}px 'PingFang SC',sans-serif`;
    ctx.fillText(paintings[i].date, sx+pw/2, ly+25);

  }

  // === Cat ===
  {
    const screenCatX = cat.wx - cameraX + W/2 - CW/2;
    const bob = cat.moving ? Math.sin(walkTick*0.30)*catScale*0.7 : 0;
    const tilt = cat.moving ? Math.sin(walkTick*0.15)*0.06 : 0;
    ctx.save();
    ctx.translate(screenCatX + CW/2, cat.y + bob);
    ctx.rotate(tilt);
    if(cat.dir==='right') ctx.scale(-1,1);
    ctx.imageSmoothingEnabled=false;
    const frame = cat.moving ? Math.floor(walkTick/8) % CAT_FRAMES : 0;
    const srcW = catImg.naturalWidth / CAT_FRAMES;
    const srcH = catImg.naturalHeight;
    ctx.drawImage(catImg, frame*srcW, 0, srcW, srcH, -CW/2, -CH/2, CW, CH);
    ctx.restore();
  }

  // Dots
  const dotY=H-16;
  paintings.forEach((_,i)=>{
    const near=Math.abs(cat.wx-paintingWorldX(i))<PAINTING_SPACING()*0.5;
    ctx.beginPath();ctx.arc(W/2+(i-(paintings.length-1)/2)*14,dotY,3.5,0,Math.PI*2);
    ctx.fillStyle=near?'rgba(140,90,20,0.9)':'rgba(100,80,50,0.35)';ctx.fill();
  });
}

function update(){
  if(overlayOpen) return;
  updateCatSize();
  let dx=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])  {dx=-cat.spd;cat.dir='left';}
  if(keys['ArrowRight']||keys['d']||keys['D']) {dx=cat.spd;cat.dir='right';}

  // Jump up to frame top / down to floor
  if((keys['ArrowUp']||keys['w']||keys['W']) && !cat.jumping && !cat.onFrame){
    let best=-1, bd=Infinity;
    for(let i=0;i<paintings.length;i++){
      const d=Math.abs(cat.wx - paintingWorldX(i));
      if(d<bd){bd=d;best=i;}
    }
    if(best>=0 && bd < PAINTING_SPACING()*0.6){
      const target = frameTopY(best);
      const dist = cat.y - target;
      // v² = 2*g*h → v = sqrt(2*0.8*dist)
      cat.jumpVy = -Math.sqrt(2 * 0.8 * Math.max(dist, 60));
      cat.jumping = true;
      cat.frameIdx = best;
    }
  }
  if((keys['ArrowDown']||keys['s']||keys['S']) && cat.onFrame && !cat.jumping){
    cat.jumpVy = 2;
    cat.jumping = true;
    cat.onFrame = false;
    cat.frameIdx = -1;
  }

  // Gravity / jump
  if(cat.jumping){
    cat.y += cat.jumpVy;
    cat.jumpVy += 0.8;
    if(cat.frameIdx >= 0 && !cat.onFrame){
      const target = frameTopY(cat.frameIdx);
      if(cat.y <= target && cat.jumpVy < 0){
        cat.y = target; cat.jumpVy = 0; cat.jumping = false; cat.onFrame = true;
      }
    }
    if(cat.y >= catFloorY()){
      cat.y = catFloorY(); cat.jumpVy = 0; cat.jumping = false; cat.onFrame = false; cat.frameIdx = -1;
    }
  } else if(!cat.onFrame){
    cat.y = catFloorY();
  }

  // Clamp cat to frame bounds when on frame; jump to adjacent frame at edges
  if(cat.onFrame && cat.frameIdx >= 0){
    const l = frameLeft(cat.frameIdx), r = frameRight(cat.frameIdx);
    const nextWX = cat.wx + dx;
    // Hit right edge → jump to next frame
    if(dx > 0 && nextWX > r - CW/2 && cat.frameIdx < paintings.length-1){
      const nextIdx = cat.frameIdx + 1;
      const target = frameTopY(nextIdx);
      cat.frameIdx = nextIdx;
      cat.onFrame = false;
      cat.jumping = true;
      cat.jumpVy = -Math.sqrt(2 * 0.8 * Math.max(Math.abs(cat.y - target), 40));
      cat.wx = r - CW/2;
      dx = 0;
    // Hit left edge → jump to prev frame
    } else if(dx < 0 && nextWX < l + CW/2 && cat.frameIdx > 0){
      const nextIdx = cat.frameIdx - 1;
      const target = frameTopY(nextIdx);
      cat.frameIdx = nextIdx;
      cat.onFrame = false;
      cat.jumping = true;
      cat.jumpVy = -Math.sqrt(2 * 0.8 * Math.max(Math.abs(cat.y - target), 40));
      cat.wx = l + CW/2;
      dx = 0;
    } else {
      cat.wx = Math.max(l + CW/2, Math.min(r - CW/2, nextWX));
      dx = 0;
    }
  }

  cat.moving = dx!==0;
  if(cat.moving) walkTick++; else if(!cat.jumping) walkTick=0;

  const minWX=HALL_PAD()-W*0.1;
  const maxWX=totalWidth()-HALL_PAD()+W*0.1;
  cat.wx=Math.max(minWX,Math.min(maxWX,cat.wx+dx));

  // Camera smoothly follows cat
  const targetCam=cat.wx;
  cameraX+=(targetCam-cameraX)*0.12;
}

function initCat(){
  updateCatSize();
  cat.wx=paintingWorldX(0);
  cat.y=catFloorY();
  cameraX=cat.wx;
}
catImg.onload=initCat; if(catImg.complete) initCat();

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
// 查看大图按钮
document.getElementById('btn-view').addEventListener('click',()=>{
  let best=-1, bd=Infinity;
  for(let i=0;i<paintings.length;i++){
    const d=Math.abs(cat.wx - paintingWorldX(i));
    if(d<bd){bd=d;best=i;}
  }
  if(best>=0) openOverlay(best);
});

// 导航按钮
const navPanel = document.getElementById('nav-panel');
paintings.forEach((p,i)=>{
  const el=document.createElement('div');
  el.className='nav-item';
  el.textContent=p.stamp+' '+p.title;
  el.addEventListener('click',()=>{
    cat.wx = paintingWorldX(i);
    navPanel.classList.remove('open');
  });
  navPanel.appendChild(el);
});
document.getElementById('btn-nav').addEventListener('click',()=>{
  navPanel.classList.toggle('open');
});
</script>
